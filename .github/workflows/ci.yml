name: ci
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install ami_tools + pytest
        run: |
          python -m pip install -e agents/tools pytest
      - name: Run unit tests
        run: pytest agents/tools/tests -q

  bicep-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-azure-cli@v1
      - name: Bicep build
        run: az bicep build --file infra/main.bicep
      - name: Lint modules
        run: |
          for f in infra/modules/*.bicep; do
            az bicep build --file "$f"
          done

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install + build web
        working-directory: apps/dashboard-web
        run: |
          npm install --no-audit --no-fund
          npm run build
