server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Runtime config never cached
  location /config.js { add_header Cache-Control "no-store"; }

  # Never cache index.html so deployments take effect immediately
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires 0;
  }

  # Hashed assets are immutable — cache forever
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri /index.html;
  }
}
