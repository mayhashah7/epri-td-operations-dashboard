server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API + WS proxy. The container's API_BASE_URL env can be injected at runtime
  # by an entrypoint script, or callers can hit the API directly by setting
  # window.__AMI_API_BASE__ in a sidecar config.js. By default we attempt
  # same-origin reverse-proxy via /api and /ws.
  location /api/ {
    proxy_pass ${API_BASE_URL}/api/;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
  }
  location /ws/ {
    proxy_pass ${API_BASE_URL}/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
  }

  location / {
    try_files $uri /index.html;
  }
}
